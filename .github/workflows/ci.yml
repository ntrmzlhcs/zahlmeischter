name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild -project zahlmeischter/zahlmeischter.xcodeproj \
            -scheme zahlmeischter \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            build
