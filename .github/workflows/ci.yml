name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      - name: Build
        run: |
          xcodebuild -project zahlmeischter/zahlmeischter.xcodeproj \
            -scheme zahlmeischter \
            -destination 'generic/platform=iOS Simulator' \
            build
