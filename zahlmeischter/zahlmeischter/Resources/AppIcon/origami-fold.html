<!DOCTYPE html>
<!-- zahlmeischter app icon — Origami Z, refined: triangular folded facets -->
<!-- Bold Z silhouette, each segment creased along a diagonal into two triangular -->
<!-- planes (light ridge / shadow valley) for a 3D folded-paper look. Premium violet. -->
<html>
<head><meta charset="utf-8"><style>html,body{margin:0;padding:0;background:#262450}svg{display:block}</style></head>
<body>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="gViolet" cx="20%" cy="18%" r="72%">
      <stop offset="0%" stop-color="#6C5CE7" stop-opacity="0.90"/>
      <stop offset="46%" stop-color="#6C5CE7" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#6C5CE7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gTeal" cx="87%" cy="13%" r="60%">
      <stop offset="0%" stop-color="#4ECDC4" stop-opacity="0.75"/>
      <stop offset="48%" stop-color="#4ECDC4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4ECDC4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gPink" cx="12%" cy="90%" r="60%">
      <stop offset="0%" stop-color="#F2A6C8" stop-opacity="0.62"/>
      <stop offset="50%" stop-color="#F2A6C8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#F2A6C8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gIndigo" cx="90%" cy="92%" r="66%">
      <stop offset="0%" stop-color="#1B1640" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#1B1640" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1B1640" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="46%" r="76%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="68%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.34"/>
    </radialGradient>
    <filter id="paperShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#160F30" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1024" height="1024" fill="#262450"/>
  <rect width="1024" height="1024" fill="url(#gViolet)"/>
  <rect width="1024" height="1024" fill="url(#gTeal)"/>
  <rect width="1024" height="1024" fill="url(#gPink)"/>
  <rect width="1024" height="1024" fill="url(#gIndigo)"/>
  <rect width="1024" height="1024" fill="url(#vignette)"/>

  <!-- folded-paper Z: 3 segments, each creased diagonally into 2 triangular facets -->
  <g filter="url(#paperShadow)">
    <!-- TOP bar: crease (250,268)->(774,388) -->
    <polygon points="250,268 774,268 774,388" fill="#ECE8F8"/> <!-- ridge (lit) -->
    <polygon points="250,268 774,388 250,388" fill="#A69CDD"/> <!-- valley (shadow) -->
    <!-- DIAGONAL: crease (774,388)->(250,636) -->
    <polygon points="774,388 539,388 250,636" fill="#DBD4EF"/> <!-- lit -->
    <polygon points="774,388 250,636 485,636" fill="#7F74C6"/> <!-- shadow -->
    <!-- BOTTOM bar: crease (250,636)->(774,756) -->
    <polygon points="250,636 774,636 774,756" fill="#E6E1F4"/> <!-- lit -->
    <polygon points="250,636 774,756 250,756" fill="#948AD0"/> <!-- shadow -->

    <!-- crease lines for crisp folds -->
    <g stroke="#241B47" stroke-opacity="0.22" stroke-width="2" fill="none" stroke-linecap="round">
      <line x1="250" y1="268" x2="774" y2="388"/>
      <line x1="774" y1="388" x2="250" y2="636"/>
      <line x1="250" y1="636" x2="774" y2="756"/>
      <!-- segment-join folds -->
      <line x1="539" y1="388" x2="774" y2="388"/>
      <line x1="250" y1="636" x2="485" y2="636"/>
    </g>
    <!-- thin lit edge along the top-left of each ridge for a crisper paper edge -->
    <g stroke="#FBFAFF" stroke-opacity="0.5" stroke-width="1.5" fill="none">
      <line x1="250" y1="268" x2="774" y2="268"/>
      <line x1="774" y1="388" x2="539" y2="388"/>
    </g>
  </g>
</svg>
</body>
</html>
